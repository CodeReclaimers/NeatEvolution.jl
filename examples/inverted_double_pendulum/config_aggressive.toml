# Aggressive Configuration for Inverted Double Pendulum
# Optimized for parallel execution on many-core systems
# Uses larger population and more evaluations for better solutions

[NEAT]
pop_size = 512  # Larger population for more exploration (good with parallelization)
fitness_criterion = "max"
fitness_threshold = 9000.0
reset_on_extinction = true
no_fitness_termination = false

[DefaultGenome]
# Network structure
num_inputs = 9
num_outputs = 1
num_hidden = 3  # Start with 3 hidden nodes (was 2)
feed_forward = true
initial_connection = "fs_neat_hidden"
connection_fraction = 0.3  # Slightly more initial connections

# Compatibility coefficients
compatibility_excess_coefficient = 1.0
compatibility_disjoint_coefficient = 1.0
compatibility_weight_coefficient = 0.4  # Slightly reduced weight importance

# Structural mutation probabilities
# More conservative to allow weight optimization
conn_add_prob = 0.4
conn_delete_prob = 0.2
node_add_prob = 0.2
node_delete_prob = 0.1
single_structural_mutation = false

# Node activation options
activation_default = "tanh"
activation_mutate_rate = 0.05  # Reduced - tanh works well
activation_options = ["tanh", "relu", "identity"]

# Node aggregation
aggregation_default = "sum"
aggregation_mutate_rate = 0.0
aggregation_options = ["sum"]

# Node bias options
bias_init_mean = 0.0
bias_init_stdev = 0.5  # Smaller initial bias
bias_init_type = "gaussian"
bias_max_value = 10.0
bias_min_value = -10.0
bias_mutate_power = 0.3
bias_mutate_rate = 0.7
bias_replace_rate = 0.1

# Node response options
response_init_mean = 1.0
response_init_stdev = 0.1  # Small variation in response
response_init_type = "gaussian"
response_max_value = 3.0
response_min_value = 0.5
response_mutate_power = 0.1
response_mutate_rate = 0.1
response_replace_rate = 0.05

# Connection weight options
weight_init_mean = 0.0
weight_init_stdev = 0.5  # Smaller initial weights (avoid saturation)
weight_init_type = "gaussian"
weight_max_value = 8.0
weight_min_value = -8.0
weight_mutate_power = 0.2  # Smaller mutation steps
weight_mutate_rate = 0.9  # High mutation rate for fine-tuning
weight_replace_rate = 0.05  # Low replacement rate

# Connection enabled
enabled_default = "true"
enabled_mutate_rate = 0.01

[DefaultSpeciesSet]
# Higher threshold with more hidden nodes to prevent excessive speciation
compatibility_threshold = 3.6

[DefaultStagnation]
species_fitness_func = "max"
max_stagnation = 25  # More patience before declaring stagnation
species_elitism = 3  # Protect more top species

[DefaultReproduction]
elitism = 5  # Preserve more top performers
survival_threshold = 0.25  # More genomes can breed
min_species_size = 3
